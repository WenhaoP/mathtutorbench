name: problem_solving_competition_math
dataset_path: qwedsacf/competition_math
dataset_name: default
training_split: train
test_split: train
max_train_examples: null  # set to limit dataset size (random sampling, seed=42)
max_test_examples: 1500   # set to limit dataset size (random sampling, seed=42)
# optional filters, only level and type available for this dataset:
allowed_levels: ["Level 1", "Level 2"]
allowed_types: ["Algebra", "Prealgebra"]
system_prompt: |
  You are a helpful math tutor. Solve the question step-by-step. Provide your final answer enclosed in \boxed{}.
  {{ shots }}
  Question: {{problem}}
  Answer:
ground_truth_format: "{{ solution }}"
few_shot_samples: |
  Question: Evaluate $\left\lceil3\left(6-\frac12\right)\right\rceil$.
  Answer: Firstly, $3\left(6-\frac12\right)=18-1-\frac12=17-\frac12$. Because $0\le\frac12<1$, we have $\left\lceil17-\frac12\right\rceil=\boxed{17}$.
  Question: What is the degree of the polynomial $(4 +5x^3 +100 +2\pi x^4 + \sqrt{10}x^4 +9)$?
  Answer: This polynomial is not written in standard form. However, we don't need to write it in standard form, nor do we need to pay attention to the coefficients. We just look for the exponents on $x$. We have an $x^4$ term and no other term of higher degree, so $\boxed{4}$ is the degree of the polynomial.
stop: ["Question:"]
